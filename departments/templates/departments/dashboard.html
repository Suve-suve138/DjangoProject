{% extends 'base.html' %}
{% block content %}
<h2>Department Dashboard</h2>
<table class="table">
  <thead>
    <tr>
      <th>Complaint ID</th>
      <th>Title</th>
      <th>Status</th>
      <th>Priority</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    {% for c in complaints %}
      <tr>
        <td>{{ c.unique_id }}</td>
        <td>{{ c.title }}</td>
        <td>{{ c.get_status_display }}</td>
        <td>{{ c.get_priority_display }}</td>
        <td><a href="{% url 'departments:update_status' c.unique_id %}">Update</a></td>
      </tr>
    {% empty %}
      <tr><td colspan="5">No assigned complaints.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
